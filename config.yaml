# ─────────────────────────────────────────────────────────────────────────────
# Job Application Agent - Configuration
# Run `python main.py setup` for interactive setup, or edit this file directly.
# ─────────────────────────────────────────────────────────────────────────────

# Your Anthropic API key (or set ANTHROPIC_API_KEY environment variable)
anthropic_api_key: "YOUR_API_KEY_HERE"

# ── Browser ──────────────────────────────────────────────────────────────────
# headless: true  = browser runs silently in the background (recommended)
# headless: false = browser window opens so you can watch (good for debugging)
headless: true
slow_mo_ms: 50        # milliseconds between browser actions (increase to slow down)

# ── Application Behavior ─────────────────────────────────────────────────────
apply_delay_seconds: 30    # Wait between applications to avoid rate limiting
job_sources:               # Job boards to search (only 'indeed' supported out-of-box)
  - indeed

# ── Personal Profile (used for auto-fill) ────────────────────────────────────
profile:
  zip_code: "60004"
  state: "IL"
  country: "United States"
  work_authorization: "Yes"
  requires_sponsorship: "No"
  desired_salary: ""          # Leave blank to skip salary fields
  notice_period: "2 weeks"
  years_of_experience: "5"
  education_level: "Bachelor's Degree"
  # EEO / Diversity fields (optional — leave blank to skip)
  veteran_status: "I am not a veteran"
  disability_status: "I don't wish to answer"
  pronouns: ""
